# MI-SOAR-NGFW Local Development Overrides
# For VirtualBox/local development environment

version: '3.8'

services:
  # Suricata - use bridge network for local testing
  suricata:
    network_mode: bridge
    environment:
      SURICATA_IFACE: eth0
    volumes:
      - ./configs/suricata:/etc/suricata:ro
      - ./storage/logs/suricata:/var/log/suricata
      - ./storage/rules:/var/lib/suricata/rules:ro
    # Disable health check in local (suricatasc may not be available)
    healthcheck:
      disable: true

  # WireGuard - generate keys on first run
  wireguard:
    network_mode: bridge
    environment:
      PEERS: 5
      INTERNAL_SUBNET: 10.10.1.1/24
    volumes:
      - ./configs/wireguard:/config
      - ./storage/wireguard:/data
    ports:
      - "51820:51820/udp"

  # nftables - simplified rules for local
  nftables:
    network_mode: bridge
    volumes:
      - ./configs/nftables/local.nft:/etc/nftables/main.nft:ro
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      echo 'Loading local nftables rules' &&
      nft --check -f /etc/nftables/main.nft &&
      nft -f /etc/nftables/main.nft &&
      echo 'Local nftables rules loaded' &&
      tail -f /dev/null
      "

  # Wazuh - reduced resources for local
  wazuh:
    networks:
      mi-soar-network:
        ipv4_address: 10.10.0.10
    environment:
      WAZUH_API_USER: admin
      WAZUH_API_PASSWORD: admin
    ports:
      - "55000:55000"
      - "1514:1514"
    # Reduce memory usage
    mem_limit: 2g
    mem_reservation: 1g

  # n8n - development settings
  n8n:
    networks:
      mi-soar-network:
        ipv4_address: 10.10.0.20
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_WEBHOOK_URL: http://localhost:5678
      N8N_ENCRYPTION_KEY: development-key-change-in-production
    ports:
      - "5678:5678"
    volumes:
      - ./configs/n8n:/home/node/.n8n
      - ./storage/n8n/data:/home/node/.n8n/data
      - ./storage/n8n/logs:/home/node/.n8n/logs

  # Traefik - simplified for local
  traefik:
    networks:
      mi-soar-network:
        ipv4_address: 10.10.0.30
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--log.level=DEBUG"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

# Local network configuration
networks:
  mi-soar-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24