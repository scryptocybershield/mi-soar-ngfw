# MI-SOAR-NGFW Local Development Overrides
# For VirtualBox/local development environment

services:
  # Suricata - use bridge network for local testing
  suricata:
    network_mode: bridge
    environment:
      SURICATA_IFACE: eth0
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      echo 'Running Suricata in local mock mode' &&
      tail -f /dev/null
      "
    volumes:
      - ./storage/logs/suricata:/var/log/suricata
    # Disable health check in local (suricatasc may not be available)
    healthcheck:
      disable: true

  # WireGuard - generate keys on first run
  wireguard:
    network_mode: bridge
    environment:
      PEERS: 5
      INTERNAL_SUBNET: 10.10.1.1/24
    volumes:
      - ./configs/wireguard:/config
      - ./storage/wireguard:/data
    ports:
      - "51820:51820/udp"

  # nftables - simplified rules for local
  nftables:
    network_mode: bridge
    depends_on:
      suricata:
        condition: service_started
    volumes:
      - ./configs/nftables/local.nft:/etc/nftables/main.nft:ro
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      echo 'Loading local nftables rules' &&
      apt-get update &&
      apt-get install -y --no-install-recommends nftables &&
      nft --check -f /etc/nftables/main.nft &&
      nft -f /etc/nftables/main.nft &&
      echo 'Local nftables rules loaded' &&
      tail -f /dev/null
      "

  # Wazuh - reduced resources for local
  wazuh:
    networks:
      mi-soar-network:
        ipv4_address: 10.10.0.10
    environment:
      WAZUH_API_USER: admin
      WAZUH_API_PASSWORD: admin
    volumes: []
    ports:
      - "55000:55000"
      - "1514:1514"
    healthcheck:
      disable: true
    # Reduce memory usage
    mem_limit: 2g
    mem_reservation: 1g

  # n8n - development settings
  n8n:
    depends_on:
      wazuh:
        condition: service_started
    healthcheck:
      disable: true
    networks:
      mi-soar-network:
        ipv4_address: 10.10.0.20
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_WEBHOOK_URL: http://localhost:5678
      N8N_ENCRYPTION_KEY: development-key-change-in-production
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - ./configs/n8n:/home/node/.n8n
      - ./storage/n8n/data:/home/node/.n8n/data
      - ./storage/n8n/logs:/home/node/.n8n/logs

  # Traefik - simplified for local
  traefik:
    networks:
      mi-soar-network:
        ipv4_address: 10.10.0.30
    command:
      - "--api.dashboard=true"
      - "--api.insecure=${TRAEFIK_API_INSECURE:-false}"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.traefik.address=:8080"
      - "--certificatesresolvers.${TRAEFIK_CERTRESOLVER:-letsencrypt}.acme.tlschallenge=true"
      - "--certificatesresolvers.${TRAEFIK_CERTRESOLVER:-letsencrypt}.acme.email=${TRAEFIK_ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.${TRAEFIK_CERTRESOLVER:-letsencrypt}.acme.storage=/letsencrypt/acme.json"
      - "--log.level=DEBUG"
    ports:
      - "${TRAEFIK_WEB_PORT:-80}:80"
      - "${TRAEFIK_WEBSECURE_PORT:-443}:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./configs/traefik/traefik.local.yml:/etc/traefik/traefik.yml:ro
      - traefik-acme:/letsencrypt

  # Mock firewall API for local development and SOAR workflow testing
  mock-firewall:
    build:
      context: ./mock_firewall
      dockerfile: Dockerfile
    container_name: mi-soar-mock-firewall
    restart: unless-stopped
    networks:
      mi-soar-network:
        ipv4_address: 10.10.0.40
    environment:
      LOG_LEVEL: info
      FIREWALL_DASHBOARD_TOKEN: ${FIREWALL_DASHBOARD_TOKEN:-}
    ports:
      - "${MOCK_FIREWALL_PORT:-8081}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Policy API (control-plane action intake for edge-agent enforcement)
  policy-api:
    build:
      context: ./policy_api
      dockerfile: Dockerfile
    container_name: mi-soar-policy-api
    restart: unless-stopped
    networks:
      mi-soar-network:
        ipv4_address: 10.10.0.41
    environment:
      DATABASE_URL: sqlite:///./policy.db
      POLICY_API_N8N_KEY: ${POLICY_API_N8N_KEY:-change-me-n8n}
      POLICY_API_EDGE_KEY: ${POLICY_API_EDGE_KEY:-change-me-edge}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${POLICY_API_PORT:-8090}:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3


# Local network configuration
networks:
  mi-soar-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.0.0/24

volumes:
  traefik-acme:
    driver: local
