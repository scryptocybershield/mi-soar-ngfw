<!-- MI-SOAR-NGFW Wazuh Manager Configuration -->
<ossec_config>
  <!-- Global settings -->
  <global>
    <jsonout_output>yes</jsonout_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>no</email_notification>
    <smtp_server>localhost</smtp_server>
    <email_from>wazuh@localhost</email_from>
    <email_to>root@localhost</email_to>
  </global>

  <!-- Rules -->
  <rules>
    <include>rules_config.xml</include>
    <include>pci_dss.yml</include>
    <include>gdpr.yml</include>
    <include>nist_800_53.yml</include>
    <include>tsc.yml</include>
    <!-- MI-SOAR-NGFW custom rules -->
    <include>mi-soar-ngfw_rules.xml</include>
  </rules>

  <!-- Authentication -->
  <auth>
    <disabled>no</disabled>
    <port>1515</port>
    <use_source_ip>no</use_source_ip>
    <force_insert>no</force_insert>
    <force_time>0</force_time>
    <purge>yes</purge>
    <use_password>yes</use_password>
    <ciphers>HIGH:!ADH:!EXP:!MD5:!RC4:!3DES:!CAMELLIA:@STRENGTH</ciphers>
    <!-- SSL -->
    <ssl_agent_ca>/var/ossec/etc/rootCA.pem</ssl_agent_ca>
    <ssl_manager_cert>/var/ossec/etc/manager.cert</ssl_manager_cert>
    <ssl_manager_key>/var/ossec/etc/manager.key</ssl_manager_key>
  </auth>

  <!-- Agent communication -->
  <remote>
    <connection>secure</connection>
    <port>1514</port>
    <protocol>tcp</protocol>
    <queue_size>131072</queue_size>
  </remote>

  <!-- Local file monitoring -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/suricata/eve.json</location>
    <alias>suricata_alerts</alias>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/nftables/*.log</location>
    <alias>nftables_logs</alias>
  </localfile>

  <localfile>
    <log_format>command</log_format>
    <alias>docker_ps</alias>
    <command>docker ps --format "table {{.Names}}\t{{.Status}}"</command>
    <frequency>300</frequency>
  </localfile>

  <!-- Active response -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>/var/ossec/etc/wpk_root.pem</ca_store>
    <ca_verification>yes</ca_verification>
    <!-- Suricata rule update -->
    <command>suricata-update-rules</command>
    <location>local</location>
    <rules_id>1000001,1000002,1000003</rules_id>
    <timeout>300</timeout>
  </active-response>

  <active-response>
    <!-- nftables block IP -->
    <command>nftables-block-ip</command>
    <location>local</location>
    <rules_id>1000006</rules_id>
    <timeout>3600</timeout>
  </active-response>

  <!-- Integration with n8n -->
  <integration>
    <name>n8n</name>
    <hook_url>http://n8n:5678/webhook/wazuh-alert</hook_url>
    <level>10</level>
    <alert_format>json</alert_format>
  </integration>

  <!-- Vulnerability detection -->
  <vulnerability-detection>
    <enabled>yes</enabled>
    <index-status>yes</index-status>
    <feed-update-interval>60</feed-update-interval>
  </vulnerability-detection>

  <!-- Database output -->
  <database_output>
    <enabled>yes</enabled>
    <hostname>localhost</hostname>
    <port>3306</port>
    <username>wazuh</username>
    <password>wazuh</password>
    <database>wazuh</database>
    <type>mysql</type>
  </database_output>

  <!-- Logging -->
  <logging>
    <log_format>json</log_format>
    <debug>0</debug>
    <log_alert_level>3</log_alert_level>
  </logging>

</ossec_config>