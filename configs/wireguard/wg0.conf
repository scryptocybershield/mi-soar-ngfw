# MI-SOAR-NGFW WireGuard Server Configuration
# This is a template - actual keys will be generated by the container
# Place generated private key in /config/wg0.conf

[Interface]
Address = 10.10.1.1/24
ListenPort = 51820
PrivateKey = REPLACE_WITH_SERVER_PRIVATE_KEY
PostUp = iptables -A FORWARD -i %i -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i %i -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# Client configurations will be auto-generated
# Example client configuration:
#[Peer]
#PublicKey = CLIENT_PUBLIC_KEY
#AllowedIPs = 10.10.1.2/32