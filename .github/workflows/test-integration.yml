name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  COMPOSE_PROJECT_NAME: mi-soar-ngfw-ci

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Shell syntax checks
        run: |
          if [ -d scripts ]; then
            find scripts -type f -name "*.sh" -print0 | while IFS= read -r -d '' f; do
              echo "Checking $f"
              bash -n "$f"
            done
          fi

      - name: Python syntax checks (optional components)
        run: |
          if [ -f mock_firewall/main.py ] && [ -f mock_firewall/models.py ]; then
            python -m py_compile mock_firewall/main.py mock_firewall/models.py
          fi
          if [ -f opnsense_adapter/main.py ]; then
            python -m py_compile opnsense_adapter/main.py
          fi

      - name: Docker Compose validation
        run: |
          docker compose -f docker-compose.yml config >/dev/null
          if [ -f docker-compose.local.yml ]; then
            docker compose -f docker-compose.yml -f docker-compose.local.yml config >/dev/null
          fi
          if [ -f docker-compose.prod.yml ]; then
            docker compose -f docker-compose.yml -f docker-compose.prod.yml config >/dev/null
          fi

      - name: Config validation script (if present)
        run: |
          if [ -x scripts/monitoring/health-checks.sh ]; then
            bash scripts/monitoring/health-checks.sh --validate-only
          fi

  integration-mock-firewall:
    name: Integration (Mock Firewall)
    runs-on: ubuntu-latest
    needs: validate
    if: ${{ hashFiles('mock_firewall/main.py') != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start mock-firewall
        run: |
          docker compose -f docker-compose.yml -f docker-compose.local.yml up -d mock-firewall
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8081/healthz >/dev/null; then
              echo "mock-firewall ready"
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:8081/healthz

      - name: Run mock integration tests
        run: |
          if [ -f mock_firewall/test_mock.py ]; then
            python3 mock_firewall/test_mock.py
          fi

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.local.yml down -v

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build main image
        run: docker build -f Dockerfile -t mi-soar-ngfw:ci .

      - name: Build cloudrun image
        if: ${{ hashFiles('Dockerfile.cloudrun') != '' }}
        run: docker build -f Dockerfile.cloudrun -t mi-soar-ngfw-cloudrun:ci .

      - name: Build mock_firewall image
        if: ${{ hashFiles('mock_firewall/Dockerfile') != '' }}
        run: docker build -f mock_firewall/Dockerfile -t mi-soar-ngfw-mock-firewall:ci mock_firewall

      - name: Build opnsense_adapter image
        if: ${{ hashFiles('opnsense_adapter/Dockerfile') != '' }}
        run: docker build -f opnsense_adapter/Dockerfile -t mi-soar-ngfw-opnsense-adapter:ci opnsense_adapter

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  docs-check:
    name: Docs Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Required docs exist
        run: |
          required=("README.md" "docs/architecture.md" "docs/deployment.md")
          for f in "${required[@]}"; do
            test -f "$f" || { echo "Missing $f"; exit 1; }
          done
