name: Integration Tests

on:
  push:
    branches: [ main, master ]
    paths:
      - 'configs/**'
      - 'scripts/**'
      - 'Dockerfile'
      - 'docker-compose*.yml'
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

env:
  COMPOSE_PROJECT_NAME: mi-soar-ngfw-test

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run shell script tests
        run: |
          # Check shell script syntax
          find scripts -name "*.sh" -type f | while read script; do
            echo "Checking $script..."
            bash -n "$script"
          done

      - name: Test configuration validation
        run: |
          # Test Suricata config
          docker run --rm -v $(pwd)/configs/suricata:/etc/suricata:ro jasonish/suricata:latest -T -c /etc/suricata/suricata.yaml || echo "Suricata config test completed"

          # Test nftables config
          docker run --rm -v $(pwd)/configs/nftables:/etc/nftables:ro debian:bookworm-slim nft --check -f /etc/nftables/main.nft || echo "nftables config test completed"

      - name: Test Docker Compose configurations
        run: |
          docker-compose -f docker-compose.yml config
          docker-compose -f docker-compose.yml -f docker-compose.local.yml config
          docker-compose -f docker-compose.yml -f docker-compose.prod.yml config

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      docker:
        image: docker:dind
        options: >-
          --privileged
          --security-opt seccomp=unconfined
        ports:
          - 2375:2375

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker
        run: |
          # Wait for Docker daemon
          sleep 10

      - name: Start test environment
        run: |
          # Start a minimal set of services for testing
          docker-compose -f docker-compose.yml up -d suricata wireguard nftables

          # Wait for services to start
          sleep 30

      - name: Verify services are running
        run: |
          # Check if containers are running
          docker ps

          # Verify Suricata
          if docker exec mi-soar-suricata-test pgrep suricata > /dev/null; then
            echo "Suricata is running"
          else
            echo "Suricata failed to start"
            exit 1
          fi

          # Verify WireGuard
          if docker exec mi-soar-wireguard-test wg show > /dev/null 2>&1; then
            echo "WireGuard is running"
          else
            echo "WireGuard failed to start"
          fi

          # Verify nftables
          if docker exec mi-soar-nftables-test nft list ruleset > /dev/null 2>&1; then
            echo "nftables rules loaded"
          else
            echo "nftables failed to load rules"
          fi

      - name: Test service communication
        run: |
          # Create a test network
          docker network create test-network || true

          # Test inter-service communication
          docker run --rm --network test-network alpine:latest ping -c 2 8.8.8.8 || echo "Network test completed"

      - name: Run health checks
        run: |
          # Run the health check script
          bash scripts/monitoring/health-checks.sh || echo "Health checks completed"

      - name: Clean up
        if: always()
        run: |
          docker-compose -f docker-compose.yml down -v
          docker system prune -f

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Check for secrets in code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.before }}
          head: ${{ github.event.after }}
          extra_args: --json

      - name: Docker image security scan
        run: |
          # Build image and scan with Trivy
          docker build -t mi-soar-ngfw:security-scan .
          docker run --rm aquasec/trivy image mi-soar-ngfw:security-scan

  performance-test:
    name: Performance Test
    runs-on: ubuntu-latest
    needs: integration-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services for performance testing
        run: |
          # Start services with resource limits
          docker-compose -f docker-compose.yml up -d suricata

          # Wait for startup
          sleep 30

      - name: Run performance tests
        run: |
          # Simulate network traffic for Suricata
          docker run --rm --network host alpine:latest \
            sh -c "for i in \$(seq 1 100); do echo 'Test packet'; done | nc -w 1 localhost 80" || echo "Performance test completed"

          # Check Suricata performance metrics
          docker exec mi-soar-suricata-test suricatasc -c uptime || echo "Suricata metrics check"

      - name: Clean up
        if: always()
        run: |
          docker-compose -f docker-compose.yml down -v

  documentation-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for required documentation
        run: |
          # Check if essential documentation exists
          required_files=("README.md" "docs/architecture.md" "docs/deployment.md")
          for file in "${required_files[@]}"; do
            if [[ -f "$file" ]]; then
              echo "✓ $file exists"
            else
              echo "✗ $file missing"
            fi
          done

      - name: Validate README
        run: |
          # Check README has essential sections
          readme_sections=("## Overview" "## Installation" "## Configuration" "## Deployment")
          for section in "${readme_sections[@]}"; do
            if grep -q "$section" README.md; then
              echo "✓ README contains $section"
            else
              echo "✗ README missing $section"
            fi
          done

      - name: Check configuration documentation
        run: |
          # Check config files have comments
          config_files=$(find configs -type f -name "*.yaml" -o -name "*.yml" -o -name "*.conf" -o -name "*.json")
          for config in $config_files; do
            if head -20 "$config" | grep -q "#\|//\|<!--"; then
              echo "✓ $config has documentation"
            else
              echo "⚠ $config may lack documentation"
            fi
          done
