name: Release Docker Images

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-images-${{ github.ref_name }}
  cancel-in-progress: false

env:
  SECURITY_GATE_BLOCK_HIGH: ${{ vars.SECURITY_GATE_BLOCK_HIGH || 'false' }}

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: dev
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: policy-api
            context: policy_api
            dockerfile: policy_api/Dockerfile
            image: mi-soar-policy-api
          - name: edge-agent
            context: edge_agent
            dockerfile: edge_agent/Dockerfile
            image: mi-soar-edge-agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve gate severity policy
        id: policy
        run: |
          set -euo pipefail
          if [ "${SECURITY_GATE_BLOCK_HIGH}" = "true" ]; then
            echo "severity=HIGH,CRITICAL" >> "$GITHUB_OUTPUT"
            echo "mode=strict" >> "$GITHUB_OUTPUT"
          else
            echo "severity=CRITICAL" >> "$GITHUB_OUTPUT"
            echo "mode=default" >> "$GITHUB_OUTPUT"
          fi

      - name: Build local gate image
        run: |
          set -euo pipefail
          echo "Building local gate image for ${{ matrix.image }}"
          docker build -f "${{ matrix.dockerfile }}" -t "${{ matrix.image }}:gate" "${{ matrix.context }}"

      - name: Trivy gate local image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image }}:gate
          format: table
          exit-code: "1"
          severity: ${{ steps.policy.outputs.severity }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}
          tags: |
            type=raw,value=dev,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max

      - name: Set image references
        id: refs
        run: |
          set -euo pipefail
          if [ -z "${{ steps.build.outputs.digest }}" ]; then
            echo "::error::Build did not return a digest for ${{ matrix.image }}"
            exit 1
          fi
          primary_tag="$(echo "${{ steps.meta.outputs.tags }}" | head -n1)"
          if [ -z "$primary_tag" ]; then
            echo "::error::No metadata tags were generated for ${{ matrix.image }}"
            exit 1
          fi
          digest_ref="docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}"
          echo "primary_tag=${primary_tag}" >> "$GITHUB_OUTPUT"
          echo "digest_ref=${digest_ref}" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign published image (keyless)
        run: |
          set -euo pipefail
          cosign sign --yes --keyless \
            -a repo="${{ github.repository }}" \
            -a workflow="${{ github.workflow }}" \
            -a run_id="${{ github.run_id }}" \
            "${{ steps.refs.outputs.digest_ref }}"

      - name: Verify signature identity (GitHub OIDC)
        run: |
          set -euo pipefail
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/release-images.yml@.*$" \
            "${{ steps.refs.outputs.digest_ref }}" >/dev/null || {
              echo "::error::Signature verification failed for ${{ steps.refs.outputs.digest_ref }}"
              exit 1
            }

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.refs.outputs.primary_tag }}
          format: spdx-json
          output-file: sbom-${{ matrix.image }}.spdx.json

      - name: Attest SBOM to image digest (keyless)
        run: |
          set -euo pipefail
          cosign attest --yes --keyless \
            --type spdxjson \
            --predicate "sbom-${{ matrix.image }}.spdx.json" \
            "${{ steps.refs.outputs.digest_ref }}"

      - name: Verify SBOM attestation identity
        run: |
          set -euo pipefail
          cosign verify-attestation \
            --type spdxjson \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/release-images.yml@.*$" \
            "${{ steps.refs.outputs.digest_ref }}" >/dev/null || {
              echo "::error::SBOM attestation verification failed for ${{ steps.refs.outputs.digest_ref }}"
              exit 1
            }

      - name: Write release metadata
        run: |
          set -euo pipefail
          cat > release-metadata-${{ matrix.image }}.json <<EOF
          {
            "image": "${{ matrix.image }}",
            "environment": "dev",
            "gate_mode": "${{ steps.policy.outputs.mode }}",
            "gate_severity": "${{ steps.policy.outputs.severity }}",
            "digest_ref": "${{ steps.refs.outputs.digest_ref }}",
            "primary_tag": "${{ steps.refs.outputs.primary_tag }}",
            "workflow": "${{ github.workflow }}",
            "run_id": "${{ github.run_id }}"
          }
          EOF

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-${{ matrix.image }}.spdx.json

      - name: Upload release metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-metadata-${{ matrix.image }}
          path: release-metadata-${{ matrix.image }}.json

      - name: Release summary
        if: always()
        run: |
          {
            echo "## Release Summary: ${{ matrix.image }}"
            echo "- Environment: dev"
            echo "- Gate mode: ${{ steps.policy.outputs.mode }}"
            echo "- Blocking severities: ${{ steps.policy.outputs.severity }}"
            echo "- Digest: ${{ steps.refs.outputs.digest_ref }}"
            echo "- Primary tag: ${{ steps.refs.outputs.primary_tag }}"
            echo "- Job result: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
