name: Deploy to GCP Compute Engine

on:
  push:
    branches: [ main, master ]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'docker-compose.prod.yml'
      - 'configs/**'
      - 'scripts/**'
      - '.github/workflows/deploy-gcp-gce.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      zone:
        description: 'GCP Zone'
        required: false
        default: 'europe-west1-b'
        type: string
      machine_type:
        description: 'Machine type'
        required: false
        default: 'n2-standard-4'
        type: string

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  ZONE: ${{ github.event.inputs.zone || 'europe-west1-b' }}
  MACHINE_TYPE: ${{ github.event.inputs.machine_type || 'n2-standard-4' }}
  VM_NAME: mi-soar-ngfw-vm-${{ github.event.inputs.environment || 'staging' }}
  SERVICE_ACCOUNT: ${{ secrets.GCP_SA_EMAIL }}

jobs:
  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Docker Compose files
        run: |
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config

      - name: Validate configurations
        run: |
          # Check configuration files exist
          ls -la configs/
          ls -la configs/suricata/
          ls -la configs/nftables/
          ls -la configs/wireguard/
          ls -la configs/wazuh/
          ls -la configs/n8n/

          # Validate nftables syntax
          docker run --rm -v $(pwd)/configs/nftables:/etc/nftables:ro debian:bookworm-slim sh -c "
            apt-get update && apt-get install -y nftables &&
            nft --check -f /etc/nftables/main.nft
          "

      - name: Check deployment scripts
        run: |
          bash -n scripts/deploy/gcp-gce.sh
          bash -n scripts/deploy/gce-startup.sh
          bash -n scripts/monitoring/health-checks.sh

  deploy-staging:
    name: Deploy to Staging VM
    runs-on: ubuntu-latest
    needs: validate
    environment: staging
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    permissions:
      contents: 'write'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Create or update VM instance
        run: |
          # Check if VM exists
          if gcloud compute instances describe "$VM_NAME" \
            --zone "$ZONE" \
            --project "$PROJECT_ID" > /dev/null 2>&1; then
            echo "VM $VM_NAME exists, updating..."

            # Stop the VM for updates
            gcloud compute instances stop "$VM_NAME" \
              --zone "$ZONE" \
              --project "$PROJECT_ID"

            # Update metadata with new startup script
            gcloud compute instances add-metadata "$VM_NAME" \
              --zone "$ZONE" \
              --project "$PROJECT_ID" \
              --metadata-from-file startup-script=scripts/deploy/gce-startup.sh

            # Start the VM
            gcloud compute instances start "$VM_NAME" \
              --zone "$ZONE" \
              --project "$PROJECT_ID"
          else
            echo "Creating new VM $VM_NAME..."

            # Create the VM
            gcloud compute instances create "$VM_NAME" \
              --zone "$ZONE" \
              --project "$PROJECT_ID" \
              --machine-type "$MACHINE_TYPE" \
              --image-family "debian-11" \
              --image-project "debian-cloud" \
              --boot-disk-size "100GB" \
              --boot-disk-type "pd-ssd" \
              --network "default" \
              --subnet "default" \
              --tags "mi-soar-ngfw,http-server,https-server" \
              --service-account "$SERVICE_ACCOUNT" \
              --scopes "cloud-platform" \
              --metadata-from-file startup-script=scripts/deploy/gce-startup.sh \
              --metadata "project-id=$PROJECT_ID" \
              --shielded-secure-boot \
              --shielded-vtpm \
              --shielded-integrity-monitoring
          fi

      - name: Copy application files to VM
        run: |
          # Wait for VM to be ready
          sleep 30

          # Copy files
          gcloud compute scp --recurse \
            --zone "$ZONE" \
            --project "$PROJECT_ID" \
            . "$VM_NAME:/tmp/mi-soar-ngfw" || echo "SCP completed"

      - name: Execute deployment on VM
        run: |
          # Run deployment script
          gcloud compute ssh "$VM_NAME" \
            --zone "$ZONE" \
            --project "$PROJECT_ID" \
            --command "cd /tmp/mi-soar-ngfw && sudo bash scripts/deploy/gce-deploy.sh" || echo "Deployment executed"

      - name: Configure firewall rules
        run: |
          # Create firewall rules if they don't exist
          if ! gcloud compute firewall-rules describe allow-http --project "$PROJECT_ID" > /dev/null 2>&1; then
            gcloud compute firewall-rules create allow-http \
              --project "$PROJECT_ID" \
              --allow tcp:80 \
              --source-ranges 0.0.0.0/0 \
              --target-tags http-server
          fi

          if ! gcloud compute firewall-rules describe allow-https --project "$PROJECT_ID" > /dev/null 2>&1; then
            gcloud compute firewall-rules create allow-https \
              --project "$PROJECT_ID" \
              --allow tcp:443 \
              --source-ranges 0.0.0.0/0 \
              --target-tags https-server
          fi

          if ! gcloud compute firewall-rules describe allow-wireguard --project "$PROJECT_ID" > /dev/null 2>&1; then
            gcloud compute firewall-rules create allow-wireguard \
              --project "$PROJECT_ID" \
              --allow udp:51820 \
              --source-ranges 0.0.0.0/0 \
              --target-tags mi-soar-ngfw
          fi

      - name: Run health checks
        run: |
          # Get VM IP
          VM_IP=$(gcloud compute instances describe "$VM_NAME" \
            --zone "$ZONE" \
            --project "$PROJECT_ID" \
            --format 'value(networkInterfaces[0].accessConfigs[0].natIP)')

          echo "VM IP: $VM_IP"

          # Wait for services to start
          sleep 60

          # Run health checks via SSH
          gcloud compute ssh "$VM_NAME" \
            --zone "$ZONE" \
            --project "$PROJECT_ID" \
            --command "cd /opt/mi-soar-ngfw && bash scripts/monitoring/health-checks.sh" || echo "Health checks completed"

      - name: Create deployment tag
        if: github.event_name == 'push'
        run: |
          git tag "deploy/staging/${{ github.sha }}"
          git push origin "deploy/staging/${{ github.sha }}"

  deploy-production:
    name: Deploy to Production VM
    runs-on: ubuntu-latest
    needs: validate
    environment: production
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    permissions:
      contents: 'write'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Create production VM
        run: |
          # Use a different name for production
          PROD_VM_NAME="mi-soar-ngfw-vm-production"

          # Check if production VM exists
          if gcloud compute instances describe "$PROD_VM_NAME" \
            --zone "$ZONE" \
            --project "$PROJECT_ID" > /dev/null 2>&1; then
            echo "Production VM $PROD_VM_NAME exists, performing blue-green deployment..."

            # Create new VM with temporary name
            TEMP_VM_NAME="mi-soar-ngfw-vm-production-new-${GITHUB_SHA::8}"
            gcloud compute instances create "$TEMP_VM_NAME" \
              --zone "$ZONE" \
              --project "$PROJECT_ID" \
              --machine-type "$MACHINE_TYPE" \
              --image-family "debian-11" \
              --image-project "debian-cloud" \
              --boot-disk-size "100GB" \
              --boot-disk-type "pd-ssd" \
              --network "default" \
              --subnet "default" \
              --tags "mi-soar-ngfw,http-server,https-server" \
              --service-account "$SERVICE_ACCOUNT" \
              --scopes "cloud-platform" \
              --metadata-from-file startup-script=scripts/deploy/gce-startup.sh \
              --metadata "project-id=$PROJECT_ID"

            # Copy files to new VM
            sleep 30
            gcloud compute scp --recurse \
              --zone "$ZONE" \
              --project "$PROJECT_ID" \
              . "$TEMP_VM_NAME:/tmp/mi-soar-ngfw"

            # Deploy to new VM
            gcloud compute ssh "$TEMP_VM_NAME" \
              --zone "$ZONE" \
              --project "$PROJECT_ID" \
              --command "cd /tmp/mi-soar-ngfw && sudo bash scripts/deploy/gce-deploy.sh"

            # TODO: Update load balancer to point to new VM
            # TODO: Delete old VM after verification

            echo "Blue-green deployment in progress. Old VM: $PROD_VM_NAME, New VM: $TEMP_VM_NAME"
          else
            echo "Creating new production VM..."
            gcloud compute instances create "$PROD_VM_NAME" \
              --zone "$ZONE" \
              --project "$PROJECT_ID" \
              --machine-type "$MACHINE_TYPE" \
              --image-family "debian-11" \
              --image-project "debian-cloud" \
              --boot-disk-size "100GB" \
              --boot-disk-type "pd-ssd" \
              --network "default" \
              --subnet "default" \
              --tags "mi-soar-ngfw,http-server,https-server" \
              --service-account "$SERVICE_ACCOUNT" \
              --scopes "cloud-platform" \
              --metadata-from-file startup-script=scripts/deploy/gce-startup.sh \
              --metadata "project-id=$PROJECT_ID"
          fi

      - name: Set up load balancer
        run: |
          # Configure load balancer for production
          # This is a simplified example - real implementation would be more complex
          PROD_VM_NAME="mi-soar-ngfw-vm-production"

          # Create instance group only if it doesn't exist
          if ! gcloud compute instance-groups unmanaged describe "mi-soar-ngfw-group" \
            --zone "$ZONE" \
            --project "$PROJECT_ID" > /dev/null 2>&1; then
            gcloud compute instance-groups unmanaged create "mi-soar-ngfw-group" \
              --zone "$ZONE" \
              --project "$PROJECT_ID"
          else
            echo "Instance group mi-soar-ngfw-group already exists"
          fi

          gcloud compute instance-groups unmanaged add-instances "mi-soar-ngfw-group" \
            --zone "$ZONE" \
            --project "$PROJECT_ID" \
            --instances "$PROD_VM_NAME" || echo "Instance may already be attached to group"

      - name: Run production health checks
        run: |
          PROD_VM_NAME="mi-soar-ngfw-vm-production"

          # Wait for deployment to complete
          sleep 120

          # Run comprehensive health checks
          gcloud compute ssh "$PROD_VM_NAME" \
            --zone "$ZONE" \
            --project "$PROJECT_ID" \
            --command "cd /opt/mi-soar-ngfw && bash scripts/monitoring/health-checks.sh"

      - name: Create production deployment tag
        run: |
          git tag "deploy/production/${{ github.sha }}"
          git push origin "deploy/production/${{ github.sha }}"
